<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>White River GC Tournament Winning Points and Playing Handicap Reduction Stokes</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #eef1f6;
      color: #1f2937;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 80vh;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding: 12px 12px 12px;
      background: radial-gradient(circle at top, rgba(59,130,246,0.12), transparent 30%),
                  linear-gradient(180deg, #eef1f6 0%, #f8fafc 100%);
    }
    .page-shell {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 16px;
      box-shadow: 0px 24px 60px rgba(23, 43, 77, 0.08);
      overflow: hidden;
    }
    .hero {
      text-align: center;
      color: #494d56;
      padding: 0px 18px 0px;
    }
    .image-wrap {
      display: block;
      border-top: 1px solid rgba(148,163,184,0.16);
      padding: 12px 12px 12px;
      background: #f8fafc;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 2px;
      box-shadow: 0 12px 30px rgba(15,23,42,0.08);
      object-fit: contain;
    }
    .footer {
      margin-top: 4px;
      color: #6b7280;
      font-size: 0.85rem;
      text-align: center;
    }
    @media (max-width: 640px) {
      .hero {
        padding: 0px 18px 0px;
      }
      .image-wrap {
        padding: 12px 12px 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="card">
      <div class="hero">
        <h4>White River GC - Tournament Winning Points and Playing Handicap Reduction Stokes</h5>
      </div>
      <div class="image-wrap">
        <img src="r.jpg" alt="White River GC tournament winning points and playing handicap reduction chart">
      </div>
    </section>
    <div class="footer">White River GC &bull; Last Updated: 2026-05-06</div>
  </main>
</body>
</html>
